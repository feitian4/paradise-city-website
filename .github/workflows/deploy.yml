name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'code/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Vercel CLI
        run: npm install -g vercel
        
      - name: Deploy to Vercel
        run: |
          cd code
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_Apm8vfoxCZMEbwLvbSlaNnFq
          VERCEL_PROJECT_ID: prj_1AXQtRifm0865e9PgtnRCjD8RHPO
